<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الروبوكس | MASTER CHEAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e63946;
            --gold: #ffd60a;
            --dark: #0a0a0a;
            --card: rgba(255,255,255,0.03);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--dark);
            color: white;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 80% 10%, rgba(230,57,70,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 10% 80%, rgba(255,214,10,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .content { position: relative; z-index: 1; }

        /* Header */
        .header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--red), #c1121f);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(230,57,70,0.4);
        }
        .logo-text { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        .logo-sub { font-size: 10px; color: #666; font-weight: 400; }

        /* Offer Cards */
        .offer-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .offer-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .offer-card.blue::before { background: linear-gradient(135deg, rgba(59,130,246,0.1), transparent); }
        .offer-card.purple::before { background: linear-gradient(135deg, rgba(147,51,234,0.1), transparent); }
        .offer-card.gold::before { background: linear-gradient(135deg, rgba(255,214,10,0.1), transparent); }
        .offer-card.red::before { background: linear-gradient(135deg, rgba(230,57,70,0.1), transparent); }
        .offer-card:hover::before, .offer-card.selected::before { opacity: 1; }
        .offer-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
        .offer-card:active { transform: scale(0.98); }
        .offer-card.selected { border-color: rgba(255,255,255,0.2) !important; }

        .offer-badge {
            position: absolute;
            top: -1px; left: -1px;
            background: var(--red);
            font-size: 9px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 20px 0 8px 0;
        }
        .offer-amount { font-size: 22px; font-weight: 900; }
        .offer-price { font-size: 11px; color: #888; margin-top: 2px; }
        .offer-price span { color: #aaa; font-weight: 700; }

        .buy-btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }
        .buy-btn:hover { filter: brightness(1.2); transform: scale(1.05); }
        .buy-btn.blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .buy-btn.purple { background: linear-gradient(135deg, #9333ea, #6d28d9); }
        .buy-btn.gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .buy-btn.red { background: linear-gradient(135deg, #ef4444, #b91c1c); }

        /* Section title */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* Payment box */
        .payment-box {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 24px;
            padding: 24px;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .payment-box.show { display: block; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wallet-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,214,10,0.2);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin: 16px 0;
        }
        .wallet-number {
            font-size: 26px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 3px;
            direction: ltr;
        }
        .wallet-type {
            font-size: 10px;
            color: #444;
            margin-top: 4px;
        }
        .copy-btn {
            background: rgba(255,214,10,0.1);
            border: 1px solid rgba(255,214,10,0.2);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255,214,10,0.2); }

        /* File input */
        .file-upload {
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .file-upload:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.02); }
        .file-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .file-upload.has-file { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.05); }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .submit-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(1px); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: rgba(16,185,129,0.4); color: #10b981; }
        .toast.error { border-color: rgba(239,68,68,0.4); color: #ef4444; }

        /* Loading dots */
        .loading-dots span { animation: blink 1.4s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .pulse-dot {
            width: 6px; height: 6px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }
    </style>
</head>
<body>
<div class="content">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">💎</div>
            <div>
                <div class="logo-text">MASTER CHEAT</div>
                <div class="logo-sub">متجر الروبوكس الرسمي</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#555;">
            <span class="pulse-dot"></span>
            أونلاين
        </div>
    </div>

    <div style="padding: 24px 20px; padding-bottom: 40px;">

        <!-- Welcome -->
        <div style="margin-bottom: 28px;">
            <h1 style="font-size: 28px; font-weight: 900; line-height: 1.2; margin-bottom: 6px;">
                اشحن روبوكسك<br>
                <span style="color: var(--red);">بأرخص سعر 🔥</span>
            </h1>
            <p style="font-size: 12px; color: #555;">توصيل فوري بعد تأكيد الدفع</p>
        </div>

        <!-- Offers -->
        <div class="section-title">📦 العروض المتاحة</div>
        <div id="offers-container" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px;">
            <!-- Offers loaded dynamically from Firebase -->
            <div style="text-align:center; padding: 40px; color: #444; font-size: 13px;">
                <div class="loading-dots">تحميل العروض<span>.</span><span>.</span><span>.</span></div>
            </div>
        </div>

        <!-- Payment Box -->
        <div class="payment-box" id="payment-box">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
                <div style="width:32px;height:32px;background:rgba(16,185,129,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;">✅</div>
                <div>
                    <div style="font-size:15px;font-weight:900;color:#10b981;">إتمام الدفع</div>
                    <div style="font-size:11px;color:#555;" id="selected-info">—</div>
                </div>
            </div>

            <p style="font-size: 12px; color: #888; margin-bottom: 4px;">حوّل مبلغ</p>
            <p style="font-size: 20px; font-weight: 900; margin-bottom: 12px;">
                <span id="price-tag" style="color:var(--gold);"></span>
                <span style="font-size: 13px; color: #666;"> جنيه</span>
            </p>

            <p style="font-size: 12px; color: #888; margin-bottom: 4px;">على الرقم التالي:</p>
            <div class="wallet-box">
                <div class="wallet-number" id="wallet-number">—</div>
                <div class="wallet-type">فودافون كاش / إنستا باي</div>
                <button class="copy-btn" onclick="copyWallet()">📋 نسخ الرقم</button>
            </div>

            <p style="font-size: 12px; color: #888; margin-bottom: 8px;">ارفع صورة التحويل:</p>
            <div class="file-upload" id="file-upload-area">
                <input type="file" id="screenshot" accept="image/*" onchange="handleFile(this)">
                <div id="file-upload-content">
                    <div style="font-size: 28px; margin-bottom: 6px;">📸</div>
                    <div style="font-size: 13px; font-weight: 700; margin-bottom: 2px;">اضغط لرفع الصورة</div>
                    <div style="font-size: 10px; color: #555;">PNG, JPG, JPEG</div>
                </div>
            </div>

            <div style="margin-top: 8px; margin-bottom: 16px;">
                <label style="font-size: 12px; color: #888; display: block; margin-bottom: 6px;">اسم المستخدم / رقمك في الرابلوكس:</label>
                <input type="text" id="username-input" placeholder="مثال: Player123"
                    style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:white;font-family:'Cairo',sans-serif;font-size:13px;outline:none;">
            </div>

            <button class="submit-btn" id="sub-btn" onclick="submitOrder()">إرسال الطلب للأدمن 🚀</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
        databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let selectedAmount = 0;
    let selectedPrice = 0;
    let walletNumber = '';

    const colors = ['blue', 'purple', 'gold', 'red'];
    const colorBtns = { blue: 'blue', purple: 'purple', gold: 'gold', red: 'red' };
    const emojis = ['💎', '🔥', '⚡', '👑', '🚀', '💫'];

    // Load offers from Firebase
    onValue(ref(db, 'master_cheat/offers'), (snap) => {
        const container = document.getElementById('offers-container');
        if (!snap.exists() || snap.size === 0) {
            container.innerHTML = `<div style="text-align:center;padding:40px;color:#444;font-size:13px;">لا توجد عروض متاحة حالياً</div>`;
            return;
        }
        container.innerHTML = '';
        let i = 0;
        snap.forEach(offer => {
            const d = offer.val();
            const color = colors[i % colors.length];
            const emoji = emojis[i % emojis.length];
            const isPopular = d.popular || false;
            const div = document.createElement('div');
            div.className = `offer-card ${color}`;
            div.onclick = () => selectOffer(d.amount, d.price, offer.key);
            div.innerHTML = `
                ${isPopular ? '<div class="offer-badge">الأكثر طلباً 🔥</div>' : ''}
                <div>
                    <div class="offer-amount">${emoji} ${d.amount} Robux</div>
                    <div class="offer-price">السعر: <span>${d.price} جنيه</span></div>
                    ${d.note ? `<div style="font-size:10px;color:#10b981;margin-top:2px;">${d.note}</div>` : ''}
                </div>
                <button class="buy-btn ${color}">شراء</button>
            `;
            container.appendChild(div);
            i++;
        });
    });

    // Load wallet number
    onValue(ref(db, 'master_cheat/settings/wallet'), (snap) => {
        if (snap.exists()) {
            walletNumber = snap.val();
            document.getElementById('wallet-number').textContent = walletNumber;
        }
    });

    window.selectOffer = (amount, price, key) => {
        selectedAmount = amount;
        selectedPrice = price;

        document.querySelectorAll('.offer-card').forEach(c => c.classList.remove('selected'));
        event.currentTarget.classList.add('selected');

        document.getElementById('price-tag').textContent = price;
        document.getElementById('selected-info').textContent = `${amount} Robux مقابل ${price} جنيه`;

        const box = document.getElementById('payment-box');
        box.classList.add('show');
        setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    };

    window.copyWallet = () => {
        navigator.clipboard.writeText(walletNumber).then(() => showToast('تم نسخ الرقم! 📋', 'success'));
    };

    window.handleFile = (input) => {
        if (input.files[0]) {
            const area = document.getElementById('file-upload-area');
            const content = document.getElementById('file-upload-content');
            area.classList.add('has-file');
            content.innerHTML = `
                <div style="font-size:28px;margin-bottom:6px;">✅</div>
                <div style="font-size:13px;font-weight:700;color:#10b981;">${input.files[0].name}</div>
                <div style="font-size:10px;color:#555;">اضغط للتغيير</div>
            `;
        }
    };

    window.submitOrder = async () => {
        const fileInput = document.getElementById('screenshot');
        const username = document.getElementById('username-input').value.trim();

        if (!fileInput.files[0]) { showToast('لازم ترفع صورة التحويل! 📸', 'error'); return; }
        if (!username) { showToast('ادخل اسمك في الرابلوكس! 🎮', 'error'); return; }

        const btn = document.getElementById('sub-btn');
        btn.innerHTML = `<span class="loading-dots">جاري الإرسال<span>.</span><span>.</span><span>.</span></span>`;
        btn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(fileInput.files[0]);
        reader.onload = async () => {
            try {
                const orderRef = push(ref(db, 'master_cheat/orders'));
                await set(orderRef, {
                    user: username,
                    amount: selectedAmount,
                    price: selectedPrice,
                    screenshot: reader.result,
                    status: 'pending',
                    date: new Date().toLocaleString('ar-EG')
                });
                showToast('تم إرسال طلبك بنجاح! ✅', 'success');
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showToast('حدث خطأ، حاول مرة تانية ❌', 'error');
                btn.innerHTML = 'إرسال الطلب للأدمن 🚀';
                btn.disabled = false;
            }
        };
    };

    window.showToast = (msg, type = 'success') => {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    };
</script>
</body>
</html>
